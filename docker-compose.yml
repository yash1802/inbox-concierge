services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: inbox
      POSTGRES_PASSWORD: inbox
      POSTGRES_DB: inbox_concierge
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inbox -d inbox_concierge"]
      interval: 3s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
